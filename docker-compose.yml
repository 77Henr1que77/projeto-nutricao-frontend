version: "3.9"

services:
  backend:
    build:
      context: ./backend-nutricao
    container_name: backend_nutricao
    ports:
      - "8000:8000"
    env_file:
      - ./backend-nutricao/.env
    volumes:
      - ./backend-nutricao:/app

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: frontend_nutricao
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - backend